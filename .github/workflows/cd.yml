name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  test:
    uses: ./.github/workflows/test-job.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "eu-west-2"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - uses: joerdav/setup-xc@eaed99ccd40453d5ab8fe50e7dfd033e6f302e98 # v1
      - name: "software-versions"
        run: |
          set -x
          uv --version
          xc --version
          asdf --version
          node --version
          npm --version
          terraform -version
          docker --version
          docker compose version

      - run: xc build
      - run: terraform init
        working-directory: ./terraform
      - name: "Run terraform apply"
        id: apply
        run: |
          terraform apply -auto-approve
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
        working-directory: ./terraform
        env:
          TF_VAR_lambda_payload_filename: "../terraform/deployment_package.zip"
          TF_VAR_feeds_service: "FileFeedsService"
          TF_VAR_feeds_file: "feeds.txt"
          TF_VAR_max_items: "50"
          TF_VAR_max_connections: "16"
          TF_VAR_max_keepalive_connections: "16"
          TF_VAR_keepalive_expiry: "5"
          TF_VAR_retries: "3"
          TF_VAR_fetch_timeout: "3"
          TF_VAR_lambda_timeout: "15"
          TF_VAR_memory_size: "512"
          TF_VAR_log_level: "INFO"
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - run: xc healthcheck "${STEPS_APPLY_OUTPUTS_API_URL}"
        env:
          STEPS_APPLY_OUTPUTS_API_URL: ${{ steps.apply.outputs.api_url }}
